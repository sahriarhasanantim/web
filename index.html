<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahriar Hossain Antim | Visionary Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Modern Premium Styles */
        :root {
            --accent: #38bdf8;
            --bg-deep: #020617;
            --glass-bg: rgba(30, 41, 59, 0.4);
            --neon-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
        }

        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at top right, #1e293b, #020617);
            color: #f1f5f9;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 25px; }

        /* Hero Section */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            padding: 8px;
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            object-fit: cover;
            box-shadow: var(--neon-shadow);
            margin-bottom: 25px;
        }

        .profile-img:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 50px rgba(56, 189, 248, 0.6);
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #ffffff, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .sub-headline {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-top: 15px;
            letter-spacing: 1px;
        }

        .btn-main {
            padding: 16px 45px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.4s;
            display: inline-block;
            margin-top: 35px;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            background: var(--accent);
            color: #000;
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.3);
        }

        .btn-main:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(56, 189, 248, 0.5);
        }

        /* Gallery Section */
        .gallery-section {
            padding: 100px 0;
        }

        .gallery-title {
            text-align: center;
            margin-bottom: 60px;
            font-size: 2.5rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .gallery-grid img {
            width: 100%;
            height: 550px; /* ছবিগুলো অনেক বড় দেখাবে */
            object-fit: cover;
            border-radius: 30px;
            transition: 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gallery-grid img:hover {
            transform: scale(1.03);
            border-color: var(--accent);
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
        }

        /* Social Section */
        .contact-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 80px 20px;
            text-align: center;
            border-radius: 60px;
            margin: 100px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
        }

        .social-icons a {
            color: #fff;
            font-size: 40px;
            transition: 0.4s;
            opacity: 0.7;
        }

        .social-icons a:hover {
            color: var(--accent);
            transform: translateY(-12px);
            opacity: 1;
        }

        footer {
            text-align: center;
            padding: 50px 0;
            color: #475569;
            font-size: 0.9rem;
        }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            .gallery-grid { grid-template-columns: 1fr; }
            .gallery-grid img { height: 450px; }
            h1 { font-size: 3rem; }
        }
    </style>
</head>
